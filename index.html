<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CS Ops" />
    <meta name="theme-color" content="#0F2744" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>CS Operations</title>
    <style>
      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html, body { width:100%; height:100%; overflow-x:hidden; -webkit-text-size-adjust:100%; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
      body { overscroll-behavior:none; font-family:'IBM Plex Sans','Segoe UI',sans-serif; }
      #root { width:100%; min-height:100vh; min-height:100dvh; }
      input, select, textarea { font-size:16px !important; }
      @supports (padding-bottom: env(safe-area-inset-bottom)) { body { padding-bottom: env(safe-area-inset-bottom); } }
      ::-webkit-scrollbar { width:4px; height:4px; }
      ::-webkit-scrollbar-track { background:#F1F5F9; }
      ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW failed:', e));
        });
      }
    </script>
  </body>
</html>
